name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # ── Post-release: generar notas con IA (opcional, requiere ANTHROPIC_API_KEY) ──
      - name: Log release info
        if: steps.release.outputs.release_created
        run: |
          echo "Release created: v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
          echo "Tag: ${{ steps.release.outputs.tag_name }}"
