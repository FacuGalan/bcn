name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # ── Security & Code Review automático en cada PR ──
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Eres un experto en seguridad y calidad de código PHP/Laravel.
            Revisá este PR enfocándote en:

            **Seguridad (OWASP Top 10):**
            - SQL injection (especialmente en queries raw con prefijo tenant)
            - XSS en vistas Blade
            - Secrets o credenciales hardcodeadas
            - Autenticación/autorización débil
            - Validación de input insuficiente

            **Calidad de código:**
            - ¿Sigue las convenciones del proyecto Laravel + Livewire?
            - ¿Hay problemas de rendimiento obvios?
            - ¿La lógica de negocio está en Services (no en controllers/components)?
            - ¿Faltan tests para algún caso crítico?

            **Contexto del proyecto:**
            - Sistema multi-tenant con 3 conexiones MySQL (config, pymes, pymes_tenant)
            - Tablas tenant tienen prefijo {NNNNNN}_ por comercio
            - Append-only ledger para movimientos (stock, cuenta corriente, caja)

            Proporcioná feedback actionable con números de línea específicos.
            Calificá severidad: CRITICAL, HIGH, MEDIUM, LOW.
            Respondé en español.

  # ── Responder a @claude en comentarios de PRs/Issues ──
  interactive:
    name: Claude Interactive
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
