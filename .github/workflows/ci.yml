name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Get changed PHP files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.php' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Pint
        if: steps.changed.outputs.has_files == 'true'
        run: vendor/bin/pint --test ${{ steps.changed.outputs.files }}

  tests:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: pymes_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, xml, bcmath
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Create test databases
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS config_test;"
          mysql -h 127.0.0.1 -u root -ppassword -e "CREATE DATABASE IF NOT EXISTS pymes_test;"

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

          cat > .env.testing <<'EOF'
          APP_NAME="BCN Pymes Testing"
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          APP_LOCALE=es
          APP_FALLBACK_LOCALE=es
          APP_FAKER_LOCALE=es_ES
          BCRYPT_ROUNDS=4
          LOG_CHANNEL=null
          LOG_LEVEL=error
          DB_CONNECTION=config
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=pymes_test
          DB_USERNAME=root
          DB_PASSWORD=password
          DB_CONFIG_HOST=127.0.0.1
          DB_CONFIG_PORT=3306
          DB_CONFIG_DATABASE=config_test
          DB_CONFIG_USERNAME=root
          DB_CONFIG_PASSWORD=password
          DB_PYMES_HOST=127.0.0.1
          DB_PYMES_PORT=3306
          DB_PYMES_DATABASE=pymes_test
          DB_PYMES_USERNAME=root
          DB_PYMES_PASSWORD=password
          SESSION_DRIVER=array
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          BROADCAST_CONNECTION=null
          EOF

          php artisan key:generate --env=testing

      - name: Run migrations
        run: php artisan migrate --env=testing --force
        continue-on-error: true

      - name: Run tests
        run: php artisan test --env=testing
